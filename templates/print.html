<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ cfg.name }} 라벨 인쇄 ({{ rows|length }}매)</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#e2e8f0;font-family:"맑은 고딕","Malgun Gothic",sans-serif}
  .bar{position:sticky;top:0;z-index:10;background:#0f172a;color:#fff;padding:12px 18px;
    display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .bar b{font-size:16px}
  .bar .sp{margin-left:auto}
  .bar button,.bar a{background:#2563eb;color:#fff;border:0;padding:10px 18px;border-radius:9px;
    font-size:15px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit}
  .bar a.gray{background:#475569}
  .sheet{max-width:820px;margin:18px auto;padding:0 12px}
  .label{background:#fff;border:3px solid #000;margin:0 auto 22px;padding:0;overflow:hidden;
    position:relative;page-break-after:always;break-after:page}
  .num{position:absolute;top:6px;right:10px;background:#ffff00;border:1px solid #999;
    font-weight:800;font-size:16px;padding:1px 9px;border-radius:4px}
  .ttl{font-size:40px;font-weight:800;text-align:center;padding:22px 10px;border-bottom:2px solid #000;
    line-height:1.15;white-space:pre-line}
  .warn{font-size:26px;font-weight:800;text-align:center;padding:10px;background:#f2f2f2;border-bottom:2px solid #000}
  .grid{display:grid;grid-template-columns:1.1fr 3fr}
  .grid>div{border-bottom:2px solid #000;padding:12px 10px;display:flex;align-items:center;justify-content:center;
    text-align:center;font-weight:800}
  .grid>div:nth-child(odd){border-right:2px solid #000;font-size:28px;background:#fafafa}
  .grid .v{font-size:30px;word-break:break-all}
  .grid .v.big{font-size:34px}
  .grid>div:nth-last-child(-n+2){border-bottom:0}
  @media print{
    /* 방향(가로/세로)은 인쇄 대화상자에서 고른 대로 따른다 — portrait 강제하지 않음 */
    @page{size:A4;margin:8mm}
    body{background:#fff}
    .bar{display:none}
    .sheet{max-width:none;margin:0;padding:0}
    .num{display:none}
    /* 라벨 1장 = A4 1장 가득. 부착양식(엑셀)과 같은 비율로 채운다.
       (제목 30% · 개봉금지 12% · 나머지 5줄이 균등 분할) */
    .label{
      border:3px solid #000;margin:0;width:100%;
      display:flex;flex-direction:column;overflow:hidden;
      page-break-after:always;break-after:page;
    }
    .label:last-child{page-break-after:auto;break-after:auto}
    .ttl{
      flex:0 0 30%;display:flex;align-items:center;justify-content:center;
      font-size:44pt;line-height:1.15;padding:4mm;border-bottom:3px solid #000;
    }
    .warn{
      flex:0 0 12%;display:flex;align-items:center;justify-content:center;
      font-size:26pt;padding:0;border-bottom:3px solid #000;
    }
    .grid{flex:1 1 auto;grid-auto-rows:1fr}
    .grid>div{border-bottom:3px solid #000;padding:2mm 4mm}
    .grid>div:nth-child(odd){border-right:3px solid #000;font-size:24pt}
    .grid .v{font-size:28pt;word-break:break-word}
    .grid .v.big{font-size:30pt}
    .grid>div:nth-last-child(-n+2){border-bottom:0}
  }
  /* 세로(A4 297mm) — 위아래 여백 8mm씩 뺀 높이를 채운다 */
  @media print and (orientation:portrait){
    .label{height:279mm}
  }
  /* 가로(A4 210mm) — 높이가 줄어드는 만큼 글자도 함께 줄여 한 장에 딱 맞춘다 */
  @media print and (orientation:landscape){
    .label{height:192mm}
    .ttl{font-size:34pt;padding:3mm}
    .warn{font-size:20pt}
    .grid>div{padding:1.5mm 4mm}
    .grid>div:nth-child(odd){font-size:19pt}
    .grid .v{font-size:22pt}
    .grid .v.big{font-size:24pt}
  }
</style>
</head>
<body>
<div class="bar">
  <b>🏷 {{ cfg.name }} 라벨 · 총 {{ rows|length }}매</b>
  <span class="muted" style="opacity:.7">미리보기 후 인쇄 버튼을 누르세요</span>
  <span class="sp"></span>
  <button onclick="window.print()">🖨 인쇄 ({{ rows|length }}매)</button>
  <a class="gray" href="javascript:window.close()">닫기</a>
</div>
<div class="sheet">
  {% for r in rows %}
  <div class="label">
    <div class="num">{{ loop.index }}</div>
    <div class="ttl">{{ r.title }}</div>
    <div class="warn">※수령자 외 절대 개봉금지※</div>
    <div class="grid">
      <div>이고센터</div><div class="v">{{ r.거점센터 }}</div>
      <div>{{ cfg.center_label }}</div><div class="v">{{ r.센터 }}</div>
      <div>점포명</div><div class="v big">{{ r.점포명 }}</div>
      <div>상품</div><div class="v big">{{ r.상품명 }}</div>
      <div>수량</div><div class="v big">{{ r.수량 }}</div>
    </div>
  </div>
  {% endfor %}
</div>
</body>
</html>
